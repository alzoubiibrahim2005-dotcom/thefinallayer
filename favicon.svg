<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#6B46F5"/>
  <!-- Three layers stacked -->
  <rect x="16" y="66" width="72" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="16" y="54" width="58" height="8" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="16" y="42" width="72" height="8" rx="4" fill="#ffffff"/>
  <!-- Brush handle (right side) -->
  <rect x="80" y="30" width="6" height="52" rx="3" fill="#ffffff" opacity="0.9"/>
  <!-- Ferrule -->
  <rect x="78" y="80" width="10" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Bristle tip -->
  <path d="M78 85 Q83 93 88 85" fill="rgba(255,255,255,0.5)"/>
  <!-- "TFL" monogram below -->
  <text
    x="60"
    y="112"
    text-anchor="middle"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="11"
    font-weight="500"
    fill="rgba(255,255,255,0.55)"
    letter-spacing="3"
  >TFL</text>
</svg>
